name: Trust Badges

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scan-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan all skills and generate badges
        id: scan
        run: |
          set +e
          npx agentverus-scanner@0.6.2 scan . --badges
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Scanner reported findings; continuing so updated badges can still publish."
          fi
          exit 0

      - name: Upload badge artifacts
        if: ${{ hashFiles('badges/**') != '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: badges

      - name: Deploy to GitHub Pages
        if: ${{ hashFiles('badges/**') != '' }}
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summarize scan result
        if: always()
        run: |
          if [ "${{ steps.scan.outputs.exit_code }}" = "0" ]; then
            echo "AgentVerus scan completed without blocking findings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "AgentVerus scan completed with findings (exit ${{ steps.scan.outputs.exit_code }}), and updated badges were still published." >> "$GITHUB_STEP_SUMMARY"
          fi
